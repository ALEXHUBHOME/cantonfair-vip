<!-- AI客服聊天窗口 - 嵌入到网站右下角 -->
<div id="ai-chat-widget" style="display: none;">
  <div class="chat-header" onclick="toggleChat()">
    <span>💬 AI客服</span>
    <span class="chat-close">✕</span>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-message bot">
      👋 您好！欢迎咨询广交会VIP服务！
      <br><br>
      请告诉我您的需求，例如：
      <br>- 翻译服务
      <br>- VIP导购
      <br>- 工厂考察
      <br>- 价格咨询
    </div>
  </div>
  <div class="chat-input">
    <input type="text" id="chat-input" placeholder="请输入问题..." onkeypress="handleKeyPress(event)">
    <button onclick="sendMessage()">发送</button>
  </div>
</div>

<button id="chat-toggle-btn" onclick="toggleChat()" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
  z-index: 9999;
">
  💬
</button>

<style>
#ai-chat-widget {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 350px;
  height: 450px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 5px 25px rgba(0,0,0,0.15);
  z-index: 9999;
  overflow: hidden;
}
.chat-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 15px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}
.chat-messages {
  height: 340px;
  overflow-y: auto;
  padding: 15px;
}
.chat-message {
  margin-bottom: 10px;

}

.chat-input {
  display: flex;

}
.chat-input input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 20px;
  outline: none;
}
.chat-input button {
  margin-left: 10px;
  padding: 10px 20px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}
.chat-input button:hover {
  background: #764ba2;
}
</style>

<script>
// 知识库
const knowledgeBase = [
  {keywords: ["时间", "春交会", "秋交会", "什么时候", "开展"], answer: "2026年春交会: 4月15日-5月5日。秋交会: 10月15日-11月4日。广交会创办于1957年，是中国历史最长、规模最大的综合性国际贸易展会。"},
  {keywords: ["展馆", "琶洲", "地址", "位置"], answer: "广交会在广州琶洲国际会展中心举办，展馆总面积118万平方米，分为A-G区。"},
  {keywords: ["翻译"], answer: "翻译服务120美元/天起，支持英语、法语、德语、阿拉伯语等20+语言，包括商务谈判、技术文档、合同审核。"},
  {keywords: ["导购", "陪同", "vip"], answer: "VIP导购服务150美元/天起，包含展馆全程陪同、精准筛选供应商、产品对比分析、谈判技巧指导。"},
  {keywords: ["工厂", "考察", "验厂"], answer: "工厂考察200美元/次起，包含工厂预约安排、实地考察陪同、生产能力评估、质量检测报告。"},
  {keywords: ["谈判", "商务"], answer: "商务谈判服务150美元/次起，提供价格谈判、合同条款指导、翻译协调。"},
  {keywords: ["行程", "酒店", "机票"], answer: "行程安排服务：酒店预订、机票安排、机场接送、餐饮推荐，费用按需定制。"},
  {keywords: ["物流", "货运", "清关"], answer: "物流跟进服务80美元/单起，包含生产进度跟进、清关手续协助、货运跟踪。"},
  {keywords: ["价格", "收费", "多少钱"], answer: "明码标价：翻译120$/天，导购150$/天，工厂考察200$/次，商务谈判150$/次，物流80$/单。价格透明，无隐藏费用。"},
  {keywords: ["付款", "支付", "怎么付"], answer: "支持支付宝、微信支付、银行转账、PayPal，预付50%定金，服务完成后付余款。"},
  {keywords: ["预约", "怎么预约"], answer: "预约方式：WhatsApp: +852-46093965 / 微信: blackhawkzh / 邮箱: 1455933248@qq.com / 电话: +86-13823088611"},
  {keywords: ["官方", "认证"], answer: "我们是广交会认证的服务商，有正规资质，10年行业经验，服务1000+海外买家。"},
  {keywords: ["质量", "保证", "靠谱"], answer: "我们提供工厂实地考察、资质验证、样品确认、第三方质检等服务，确保供应商质量。"},
  {keywords: ["联系", "contact"], answer: "联系我们：\n- 邮箱: 1455933248@qq.com\n- 电话: +86-13823088611 / +852-46093965\n- 微信: blackhawkzh\n- WhatsApp: +852-46093965"},
];

function toggleChat() {
  const widget = document.getElementById('ai-chat-widget');
  const btn = document.getElementById('chat-toggle-btn');
  if (widget.style.display === 'none') {
    widget.style.display = 'block';
    btn.style.display = 'none';
  } else {
    widget.style.display = 'none';
    btn.style.display = 'block';
  }
}

function getAnswer(question) {
  const q = question.toLowerCase();
  for (const item of knowledgeBase) {
    for (const kw of item.keywords) {
      if (q.includes(kw)) {
        return item.answer;
      }
    }
  }
  return "感谢您的咨询！请告诉我们您的具体需求（如翻译、导购、工厂考察等），或添加微信blackhawkzh详谈。";
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;
  
  // 添加用户消息
  const messagesDiv = document.getElementById('chat-messages');
  messagesDiv.innerHTML += `<div class="chat-message user">${message}</div>`;
  
  // 获取回复
  setTimeout(() => {
    const answer = getAnswer(message);
    messagesDiv.innerHTML += `<div class="chat-message bot">${answer.replace(/\n/g, '<br>')}</div>`;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }, 500);
  
  input.value = '';
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function handleKeyPress(event) {
  if (event.key === 'Enter') {
    sendMessage();
  }
}
</script>
