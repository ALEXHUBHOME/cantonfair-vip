<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canton Fair AI Assistant</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑", Arial, sans-serif}
        .chat-container{width:380px;height:550px;border:1px solid #ddd;border-radius:12px;display:flex;flex-direction:column;position:fixed;bottom:20px;right:20px;background:#fff;box-shadow:0 0 20px rgba(0,0,0,0.15)}
        .chat-header{padding:14px;background:#0066cc;color:#fff;border-radius:12px 12px 0 0;font-weight:bold;display:flex;align-items:center;gap:10px}
        .chat-header .avatar{width:32px;height:32px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center}
        .chat-messages{flex:1;padding:10px;overflow-y:auto;background:#f7f7f7}
        .msg{margin-bottom:10px;max-width:80%;padding:10px 14px;border-radius:15px;word-wrap:break-word}
        .msg-bot{background:#e5e5ea;align-self:flex-start;border-bottom-left-radius:3px}
        .msg-user{background:#0066cc;color:#fff;align-self:flex-end;margin-left:auto;border-bottom-right-radius:3px}
        .msg-form{background:#fff3cd;padding:10px;border-radius:10px;border:1px solid #ffc107;max-width:95%}
        .chat-input{display:flex;padding:10px;border-top:1px solid #eee;gap:8px}
        .chat-input input{flex:1;padding:10px;border:1px solid #ddd;border-radius:20px;outline:none}
        .chat-input button{padding:10px 20px;background:#0066cc;color:#fff;border:none;border-radius:20px;cursor:pointer;font-weight:bold}
        .chat-input button:hover{background:#0055aa}
        .quick-buttons{display:flex;flex-wrap:wrap;padding:8px 10px;gap:6px;background:#fff;border-bottom:1px solid #eee}
        .quick-btn{padding:6px 12px;font-size:12px;border:1px solid #0066cc;color:#0066cc;border-radius:15px;background:#fff;cursor:pointer}
        .quick-btn:hover{background:#0066cc;color:#fff}
        .status{font-size:11px;color:#888;padding:5px 10px;background:#f0f0f0}
        .form-group{margin-bottom:8px}
        .form-group label{display:block;font-size:12px;color:#666;margin-bottom:3px}
        .form-group input,.form-group select{width:100%;padding:6px;border:1px solid #ddd;border-radius:5px;font-size:13px}
        .form-btn{background:#28a745 !important;width:100%;margin-top:5px}
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🤖</div>
            <div>
                <div>Canton Fair AI Assistant</div>
                <div style="font-size:11px;font-weight:normal;opacity:0.8">竭诚为您服务</div>
            </div>
        </div>
        <div class="status">💬 Online Consultation | Phone: +86 13823088611</div>
        <div class="chat-messages" id="msgBox"></div>
        <div class="quick-buttons">
            <button class="quick-btn" onclick="send('Book Translation Service')">📝 Translation</button>
            <button class="quick-btn" onclick="send('Find Suppliers')">🏭 Suppliers</button>
            <button class="quick-btn" onclick="send('Book Hotel')">🏨 Hotel</button>
            <button class="quick-btn" onclick="send('Book Flight')">✈️ Flight</button>
            <button class="quick-btn" onclick="send('Factory Visit')">🏭 Factory Visit</button>
            <button class="quick-btn" onclick="send('Contact Agent')">👤 Live Agent</button>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ask a question..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // 本地知识库
        const responses = {
            "translation": "📝 Great! We provide professional translation services.\n\n📋 Service Types:\n- Business negotiation\n- Technical documents\n- Contract review\n\n💰 Price: USD 120-200/day\n\nClick 'Contact Agent' below and we'll assist you!",
            "translator": "📝 Great! We provide professional translation services.\n\n📋 Service Types:\n- Business negotiation\n- Technical documents\n- Contract review\n\n💰 Price: USD 120-200/day",
            "supplier": "🏭 We help you find verified suppliers!\n\nTell us:\n- What products are you looking for?\n- What's your target price?\n- What's your order quantity?",
            "suppliers": "🏭 We help you find verified suppliers!\n\nTell us:\n- What products are you looking for?\n- What's your target price?",
            "factory visit": "🏭 Factory Visit Service\n\nWe arrange:\n- Factory tours\n- Quality inspection\n- Negotiation support\n\n💰 Price: USD 200-350/visit",
            "hotel": "🏨 Hotel Booking Service\n\nRecommended hotels near Pazhou Expo Center:\n- Shangri-La Hotel\n- InterContinental Guangzhou\n\nWhat's your budget and dates?",
            "flight": "✈️ Flight Booking Assistance\n\nWe can help arrange:\n- Flight booking\n- Airport pickup\n\nWhat's your departure city and date?",
            "live agent": "👤 Contact our team:\n\n📞 Phone: +86 13823088611\n💬 WhatsApp: +852 46093965\n📧 Email: 1455933248@qq.com\nWeChat: blackhawkzh",
            "contact": "👤 Contact our team:\n\n📞 Phone: +86 13823088611\n💬 WhatsApp: +852 46093965\n📧 Email: 1455933248@qq.com\nWeChat: blackhawkzh",
            "hello": "👋 Hello! Welcome to Canton Fair AI Assistant!\n\nHow can I help you today?",
            "hi": "👋 Hello! Welcome to Canton Fair AI Assistant!\n\nHow can I help you today?",
            "thank": "😊 You're welcome! Wish you a successful Canton Fair trip!",
            "thanks": "😊 You're welcome! Wish you a successful Canton Fair trip!",
            "canton fair": "📅 Canton Fair (China Import and Export Fair)\n\n📍 Guangzhou Pazhou International Exhibition Center\n\n🗓️ Spring 2026: April 15 - May 5",
            "price": "💰 Our Services:\n\n📝 Translation: USD 120-200/day\n🛒 Shopping Guide: USD 150-300/day\n🏭 Factory Visit: USD 200-350/visit",
            "pricing": "💰 Our Services:\n\n📝 Translation: USD 120-200/day\n🛒 Shopping Guide: USD 150-300/day\n🏭 Factory Visit: USD 200-350/visit"
        };
        
        function getAnswer(q) {
            q = q.toLowerCase();
            for (let key in responses) {
                if (q.indexOf(key) !== -1) return responses[key];
            }
            return "Thanks for your message! For quick response, please contact us:\n📞 +86 13823088611\n💬 WhatsApp: +852 46093965";
        }
        
        window.onload=()=>{
            addBot("Hello! I'm Canton Fair AI Assistant. How can I help you?\n\n📝 Translation | 🏭 Suppliers\n🏨 Hotel | ✈️ Flight\n🏭 Factory Visit | 👤 Live Agent\n\nLeave a message or click buttons above~");
        };

        function send(text){document.getElementById("userInput").value=text;sendMessage()}
        
        function addBot(t, isForm=false){
            const b=document.getElementById("msgBox");
            const d=document.createElement("div");
            d.className=isForm?"msg msg-bot msg-form":"msg msg-bot";
            d.innerHTML=t.replace(/\n/g,'<br>');
            b.appendChild(d);
            b.scrollTop=b.scrollHeight
        }
        
        function addUser(t){
            const b=document.getElementById("msgBox");
            const d=document.createElement("div");
            d.className="msg msg-user";
            d.innerText=t;
            b.appendChild(d);
            b.scrollTop=b.scrollHeight
        }

        function showOrderForm(serviceType){
            const forms = {
                "book_translation": `<form onsubmit="submitOrder(event,'Translation Service')">
                    <div class="form-group"><label>Name</label><input type="text" name="name" required placeholder="Your name"></div>
                    <div class="form-group"><label>Phone</label><input type="tel" name="phone" required placeholder="Your phone"></div>
                    <div class="form-group"><label>Date</label><input type="date" name="date" required></div>
                    <div class="form-group"><label>Language</label><select name="language"><option>English</option><option>Japanese</option><option>Korean</option><option>French</option><option>Other</option></select></div>
                    <div class="form-group"><label>Notes</label><input type="text" name="demand" placeholder="Other requirements"></div>
                    <button type="submit" class="btn form-btn">Submit</button>
                </form>`,
                
                "query_hotel": `<form onsubmit="submitOrder(event,'Hotel Booking')">
                    <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
                    <div class="form-group"><label>Phone</label><input type="tel" name="phone" required></div>
                    <div class="form-group"><label>Check-in</label><input type="date" name="checkin" required></div>
                    <div class="form-group"><label>Check-out</label><input type="date" name="checkout" required></div>
                    <div class="form-group"><label>Guests</label><input type="number" name="people" min="1" value="1"></div>
                    <div class="form-group"><label>Budget</label><input type="text" name="demand" placeholder="Near venue, $50/night"></div>
                    <button type="submit" class="btn form-btn">Submit</button>
                </form>`,
                
                "query_flight_train": `<form onsubmit="submitOrder(event,'Flight Booking')">
                    <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
                    <div class="form-group"><label>Phone</label><input type="tel" name="phone" required></div>
                    <div class="form-group"><label>From City</label><input type="text" name="from" placeholder="e.g., Shanghai"></div>
                    <div class="form-group"><label>To City</label><input type="text" name="to" placeholder="e.g., Guangzhou"></div>
                    <div class="form-group"><label>Date</label><input type="date" name="date" required></div>
                    <div class="form-group"><label>Guests</label><input type="number" name="people" min="1" value="1"></div>
                    <button type="submit" class="btn form-btn">Submit</button>
                </form>`,
                
                "book_factory_visit": `<form onsubmit="submitOrder(event,'Factory Visit')">
                    <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
                    <div class="form-group"><label>Phone</label><input type="tel" name="phone" required></div>
                    <div class="form-group"><label>Industry/Product</label><input type="text" name="industry" placeholder="e.g., Electronics"></div>
                    <div class="form-group"><label>Date</label><input type="date" name="date" required></div>
                    <div class="form-group"><label>Notes</label><input type="text" name="demand" placeholder="Other requirements"></div>
                    <button type="submit" class="btn form-btn">Submit</button>
                </form>`
            };
            
            return forms[serviceType] || "<p>Please leave your message. Our team will contact you soon.</p>";
        }

        function submitOrder(e, serviceType){
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            
            const name = formData.get('name');
            const phone = formData.get('phone');
            
            if(!name || !phone){
                addBot("❌ Please fill in Name and Phone fields, or contact us directly.", true);
                return;
            }
            
            // GitHub Pages can't submit to API, show contact info instead
            addBot("✅ Thank you! Our team will contact you soon.\n\n📞 Phone: +86 13823088611\n💬 WhatsApp: +852 46093965\n📧 Email: 1455933248@qq.com\nWeChat: blackhawkzh", true);
        }

        function sendMessage(){
            const t = document.getElementById("userInput").value.trim();
            if(!t) return;
            addUser(t);
            document.getElementById("userInput").value = "";
            
            const answer = getAnswer(t);
            addBot(answer);
        }
    </script>
</body>
</html>
